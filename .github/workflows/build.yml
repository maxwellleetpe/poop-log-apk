name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.4'

    - name: Download JS libs for offline use
      run: |
        cd app/src/main/assets
        curl -sO https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js
        curl -sO https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js
        curl -sO https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js
        curl -sO https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js
        sed -i 's|https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js|react.production.min.js|g' index.html
        sed -i 's|https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js|react-dom.production.min.js|g' index.html
        sed -i 's|https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js|babel.min.js|g' index.html
        sed -i 's|https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js|chart.umd.min.js|g' index.html

    - name: Build Debug APK
      run: gradle :app:assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: poop-log-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
